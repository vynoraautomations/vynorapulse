services:
  - type: web
    name: vynora-pulse-gateway
    runtime: node
    plan: starter
    buildCommand: apt-get update && apt-get install -y chromium-browser fonts-liberation libappindicator3-1 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc1 libgconf-2-4 libgdk-pixbuf1.0-0 libglib2.0-0 libgtk-3-0 libharfbuzz0b libice6 libjpeg-turbo8 libpng16-16 libpango-1.0-0 libpangocairo-1.0-0 libsm6 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxinerama1 libxrandr2 libxrender1 libxss1 libxtst6 xdg-utils && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/whatsapp/status
    healthCheckInterval: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "false"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: WHATSAPP_HEADLESS
        value: "true"
