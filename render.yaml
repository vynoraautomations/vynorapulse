services:
  - type: web
    name: vynora-pulse-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PORT
        value: 8000

  - type: web
    name: vynora-pulse-gateway
    runtime: node
    plan: starter
    rootDir: whatsapp-gateway
    buildCommand: apt-get update && apt-get install -y --no-install-recommends chromium-browser chromium-codecs-ffmpeg xvfb fonts-liberation libappindicator3-1 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libgcc1 libgdk-pixbuf1.0-0 libglib2.0-0 libgtk-3-0 libharfbuzz0b libice6 libjpeg-turbo8 libpng16-16 libpango-1.0-0 libpangocairo-1.0-0 libsm6 libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxinerama1 libxrandr2 libxrender1 libxss1 libxtst6 xdg-utils && npm ci --no-optional
    startCommand: npm start
    healthCheckPath: /api/whatsapp/status
    healthCheckInterval: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium-browser
      - key: WHATSAPP_HEADLESS
        value: "true"
      - key: PUPPETEER_CACHE_DIR
        value: /tmp/puppeteer-cache
